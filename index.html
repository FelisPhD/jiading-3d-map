<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上海嘉定区建筑地图</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #app {
      display: flex;
      height: 100%;
    }

    #sidebar {
      width: 340px;
      border-right: 1px solid #ddd;
      padding: 12px;
      box-sizing: border-box;
      overflow-y: auto;
      background: #fafafa;
    }

    #map {
      flex: 1;
    }

    .item {
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .item:hover {
      background: #f3f8ff;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    .meta {
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h2>嘉定区建筑</h2>
      <input id="keyword" placeholder="搜索名称或类型" />
      <select id="typeFilter">
        <option value="">全部类型</option>
      </select>
      <div id="count"></div>
      <div id="list"></div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const map = L.map("map").setView([31.3747, 121.265], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    const keywordInput = document.getElementById("keyword");
    const typeFilter = document.getElementById("typeFilter");
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");

    let rawData = null;
    let geoLayer = null;
    let currentFeatures = [];

    function getCenterOfFeature(feature) {
      const layer = L.geoJSON(feature);
      return layer.getBounds().getCenter();
    }

    function normalizeFeature(feature, index) {
      const p = feature.properties || {};
      return {
        id: index,
        feature,
        name: p.name || `未命名建筑 ${index + 1}`,
        type: p.building || "未知",
        height: p.height || "",
        levels: p["building:levels"] || p.levels || "",
        address:
          p["addr:full"] ||
          [p["addr:city"], p["addr:district"], p["addr:street"], p["addr:housenumber"]]
            .filter(Boolean)
            .join(" "),
        center: getCenterOfFeature(feature)
      };
    }

    function renderTypeOptions(items) {
      const types = [...new Set(items.map(i => i.type).filter(Boolean))].sort();
      typeFilter.innerHTML = '<option value="">全部类型</option>';

      for (const t of types) {
        const option = document.createElement("option");
        option.value = t;
        option.textContent = t;
        typeFilter.appendChild(option);
      }
    }

    function renderList(items) {
      listEl.innerHTML = "";
      countEl.textContent = `当前显示 ${items.length} 个建筑`;

      items.slice(0, 500).forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <strong>${item.name}</strong>
          <div class="meta">类型：${item.type}</div>
          <div class="meta">${item.address || "无地址信息"}</div>
        `;

        div.onclick = () => {
          map.setView(item.center, 17);
        };

        listEl.appendChild(div);
      });

      if (items.length > 500) {
        const tip = document.createElement("div");
        tip.className = "meta";
        tip.textContent = "列表仅显示前 500 条，地图中仍保留全部结果。";
        listEl.appendChild(tip);
      }
    }

    function renderMap(items) {
      if (geoLayer) {
        map.removeLayer(geoLayer);
      }

      geoLayer = L.geoJSON(items.map(i => i.feature), {
        style: function(feature) {
          const t = (feature.properties?.building || "").toLowerCase();

          if (t === "residential") return { weight: 1, fillOpacity: 0.5 };
          if (t === "commercial") return { weight: 1, fillOpacity: 0.5 };
          if (t === "school") return { weight: 1, fillOpacity: 0.5 };

          return { weight: 1, fillOpacity: 0.4 };
        },
        onEachFeature: function(feature, layer) {
          const p = feature.properties || {};
          const name = p.name || "未知建筑";
          const type = p.building || "未知";
          const levels = p["building:levels"] || p.levels || "未知";
          const height = p.height || "未知";
          const address =
            p["addr:full"] ||
            [p["addr:city"], p["addr:district"], p["addr:street"], p["addr:housenumber"]]
              .filter(Boolean)
              .join(" ") ||
            "未知";

          layer.bindPopup(`
            <div>
              <b>${name}</b><br/>
              类型：${type}<br/>
              层数：${levels}<br/>
              高度：${height}<br/>
              地址：${address}
            </div>
          `);
        }
      }).addTo(map);
    }

    function applyFilters() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const selectedType = typeFilter.value;

      currentFeatures = rawData.features
        .map(normalizeFeature)
        .filter(item => {
          const hitKeyword =
            !keyword ||
            item.name.toLowerCase().includes(keyword) ||
            item.type.toLowerCase().includes(keyword) ||
            (item.address || "").toLowerCase().includes(keyword);

          const hitType = !selectedType || item.type === selectedType;
          return hitKeyword && hitType;
        });

      renderList(currentFeatures);
      renderMap(currentFeatures);
    }

    fetch("./jiading_buildings.geojson")
      .then(r => r.json())
      .then(data => {
        rawData = data;
        const normalized = rawData.features.map(normalizeFeature);
        renderTypeOptions(normalized);
        applyFilters();
      })
      .catch(err => {
        listEl.innerHTML = `<p>加载 GeoJSON 失败：${err.message}</p>`;
      });

    keywordInput.addEventListener("input", applyFilters);
    typeFilter.addEventListener("change", applyFilters);
  </script>
</body>
</html>
